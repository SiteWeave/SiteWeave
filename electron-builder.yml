directories:
  output: release
  buildResources: build
  app: .
appId: com.siteweave.app
productName: SiteWeave
files:
  - filter:
      - dist-electron/**/*
      - dist/**/*
      - '!**/node_modules/**'
      - '!**/*.map'
      - '!**/*.d.ts'
      - '!**/win-unpacked/**'
      - '!**/.DS_Store'
      - '!**/Thumbs.db'
      - '!apps/**'
  # Include electron-updater in the package
  - 'node_modules/electron-updater/**/*'
win:
  target: nsis
  icon: build/icon.png
  verifyUpdateCodeSignature: false
mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  artifactName: ${productName}-${version}-${arch}.${ext}
# AppX target for MSIX/Store (build with: npm run build:win:appx)
appx:
  applicationId: SiteWeaveLLC.SiteWeave
  displayName: SiteWeave
  publisherDisplayName: Site Weave LLC
  identityName: SiteWeaveLLC.SiteWeave
  publisher: CN=068B28E9-7E32-44B0-8497-76E29332ECEA
  backgroundColor: "#FFFFFF"
nsis:
  artifactName: ${productName}-Setup-${version}.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: SiteWeave
  repo: SiteWeave
electronVersion: 38.3.0

